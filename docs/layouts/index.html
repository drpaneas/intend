{{ define "main" }}
<article class="page">
  <p class="hero-logo">
    <img src="{{ "intend-logo.png" | relURL }}" alt="intend logo">
  </p>
  <h1>{{ .Title }}</h1>
  {{ .Content }}
</article>

<nav class="page-list">
  <ul>
    {{ range .Site.RegularPages.ByWeight }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
      {{ with .Params.summary }} - {{ . }}{{ end }}
    </li>
    {{ end }}
  </ul>
</nav>
{{ end }}
